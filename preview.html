<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARTECO — Art Logistics Software</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f5f5f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 16px; padding: 48px; max-width: 520px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    h1 { font-size: 28px; font-weight: 800; margin: 0 0 8px; color: #1d1d1d; letter-spacing: -0.5px; }
    .sub { color: #888; font-size: 14px; margin-bottom: 24px; }
    .steps { text-align: left; background: #1d1d1d; color: #f0fd63; border-radius: 10px; padding: 20px 24px; font-family: monospace; font-size: 13px; line-height: 2; margin-bottom: 20px; }
    .steps span { color: #999; }
    .note { font-size: 12.5px; color: #888; }
    a { color: #646b00; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ARTECO</h1>
    <p class="sub">Art Logistics Operating System — Pilot v4</p>
    <div class="steps">
      <span># Run locally:</span><br>
      npm install<br>
      npm run dev<br><br>
      <span># Or deploy to Vercel:</span><br>
      npm run build<br>
      npx vercel --prod
    </div>
    <p class="note">
      The app is a full React SPA (~6,800 lines).<br>
      Run <code>npm run dev</code> to preview at <a href="http://localhost:5173">localhost:5173</a>
    </p>
  </div>
</body>
</html>
